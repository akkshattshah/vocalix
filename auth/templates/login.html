<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocalix</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* top-left logo */
  .topbar {
    padding: 28px 32px;
  }
  .topbar .logo-img {
    height: 32px;
    width: auto;
  }

  /* centred card */
  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .card h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: normal;
    font-size: 28px;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
    color: #111;
  }
  .card .subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 36px;
  }

  /* google button */
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    font-size: 14.5px;
    font-weight: 500;
    color: #222;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    text-decoration: none;
  }
  .google-btn:hover {
    border-color: #bbb;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .google-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* divider */
  .divider {
    display: flex;
    align-items: center;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #e5e5e5;
  }

  /* footer */
  .footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: #999;
  }
  .footer a {
    color: #555;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .footer a:hover {
    color: #111;
  }

  /* success state */
  .success-msg {
    display: none;
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 20px;
    color: #111;
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="topbar">
  <img src="/logo.png" alt="Vocalix" class="logo-img">
</div>

<div class="container">
  <div class="card" id="card">
    <h1>Welcome to Vocalix</h1>
    <p class="subtitle">Voice-first writing for every app</p>

    <a href="/auth/google" class="google-btn">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.94 23.94 0 0 0 0 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider"></div>

    <p class="success-msg" id="successMsg">Launching Vocalix...</p>
  </div>
</div>

<div class="footer">
  By clicking "Continue with Google"<br>
  you agree to our <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
</div>

<script>
(function() {
  var hash = window.location.hash.substring(1);
  if (!hash) return;

  var params = new URLSearchParams(hash);
  var accessToken = params.get("access_token");
  var refreshToken = params.get("refresh_token") || "";

  if (!accessToken) return;

  // Hide the login card, show success
  document.querySelector(".google-btn").style.display = "none";
  document.querySelector(".divider").style.display = "none";
  document.querySelector(".subtitle").style.display = "none";
  document.querySelector("h1").textContent = "You\u2019re in";
  document.getElementById("successMsg").style.display = "block";

  // Decode the JWT payload to get basic user info
  var user = {};
  try {
    var parts = accessToken.split(".");
    if (parts.length === 3) {
      var payload = JSON.parse(atob(parts[1]));
      user = {
        id: payload.sub || "",
        email: payload.email || "",
        name: payload.user_metadata && payload.user_metadata.full_name || ""
      };
    }
  } catch(e) {}

  fetch("/auth/save-token", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      access_token: accessToken,
      refresh_token: refreshToken,
      user: user
    })
  }).then(function() {
    setTimeout(function() { window.close(); }, 1500);
  });
})();
</script>

</body>
</html>
