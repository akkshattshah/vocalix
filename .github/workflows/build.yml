name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Vocalix-Windows
          - os: macos-latest
            artifact: Vocalix-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller vocalix.spec

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/Vocalix/* -DestinationPath Vocalix-Windows.zip

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../Vocalix-macOS.zip Vocalix.app

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
