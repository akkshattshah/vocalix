name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Embed API key
        run: |
          echo "OPENAI_API_KEY = '${{ secrets.OPENAI_API_KEY }}'" > core/_embedded_key.py
        shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller vocalix.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer.iss

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Vocalix-V1-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Embed API key
        run: echo "OPENAI_API_KEY = '${{ secrets.OPENAI_API_KEY }}'" > core/_embedded_key.py

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Create macOS icon (icns)
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset

      - name: Build with PyInstaller
        run: pyinstaller vocalix.spec

      - name: Create DMG installer
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dmg_staging
          cp -R dist/Vocalix.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Vocalix" -srcfolder dmg_staging \
            -ov -format UDZO "Vocalix-macOS-${VERSION}.dmg"
          cp "Vocalix-macOS-${VERSION}.dmg" Vocalix-macOS-latest.dmg

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Vocalix-macOS-${{ github.ref_name }}.dmg
            Vocalix-macOS-latest.dmg
