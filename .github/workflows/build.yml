name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Vocalix-Windows
            zip_cmd: Compress-Archive -Path dist/Vocalix/* -DestinationPath Vocalix-Windows.zip
            shell: pwsh
          - os: macos-latest
            artifact: Vocalix-macOS
            zip_cmd: cd dist && zip -r ../Vocalix-macOS.zip Vocalix.app
            shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller vocalix.spec

      - name: Create zip archive
        shell: ${{ matrix.shell }}
        run: ${{ matrix.zip_cmd }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
