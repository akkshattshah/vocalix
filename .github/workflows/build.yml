name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Embed API key
        run: |
          echo "OPENAI_API_KEY = '${{ secrets.OPENAI_API_KEY }}'" > core/_embedded_key.py
        shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller vocalix.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer.iss

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Vocalix-V1-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Embed API key
        run: echo "OPENAI_API_KEY = '${{ secrets.OPENAI_API_KEY }}'" > core/_embedded_key.py

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller vocalix.spec

      - name: Create DMG installer
        run: |
          mkdir -p dmg_staging
          cp -R dist/Vocalix.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "Vocalix" -srcfolder dmg_staging \
            -ov -format UDZO Vocalix-V1-macOS.dmg

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: Vocalix-V1-macOS.dmg
